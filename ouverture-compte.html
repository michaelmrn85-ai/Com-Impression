<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>Ouverture de compte | COM' Impression</title>
  <meta name="description" content="Demande d'ouverture de compte professionnel, association ou administration publique chez COM' Impression.">
  <link rel="canonical" href="https://com-impression.fr/ouverture-compte">
  <meta property="og:title" content="Ouverture de compte | COM' Impression">
  <meta property="og:description" content="Demandez un compte professionnel, association ou administration avec modes de paiement adaptes.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://com-impression.fr/ouverture-compte">
  <meta property="og:image" content="https://com-impression.fr/com-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./site-theme.css">
</head>
<body data-page="ouverture-compte">
  <header class="topbar">
    <div class="nav">
      <a class="brand" href="./com-impression.html">
        <img class="brand-mark" src="./com-logo.png" alt="Logo COM' Impression">
        <div class="brand-copy">
          <strong>COM' Impression</strong>
          <span>Ouverture de compte</span>
        </div>
      </a>
      <form class="search-shell" data-search-form>
        <input type="search" placeholder="Rechercher un produit ou une gamme...">
        <button class="btn" type="submit">Rechercher</button>
      </form>
      <div class="nav-actions">
        <button class="action-btn" data-account-button type="button"><span data-account-label>Mon compte</span></button>
        <button class="action-btn cart" data-cart-button type="button">Panier <span class="cart-count" data-cart-count>0</span></button>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section class="section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Compte pro, association ou administration</p>
          <h1>Demande d'ouverture de compte</h1>
          <p>Votre demande est étudiée rapidement afin d’activer les modalités de règlement adaptées à votre structure.</p>
        </div>
      </div>

      <form class="form-card" id="account-opening-form">
        <div class="inline-fields">
          <div class="field">
            <label for="account-type-client">Type de structure *</label>
            <select id="account-type-client" required>
              <option>Professionnel</option>
              <option>Association</option>
              <option>Administration publique (Chorus Pro)</option>
            </select>
          </div>
          <div class="field">
            <label for="account-siret">SIRET *</label>
            <input id="account-siret" type="text" inputmode="numeric" required placeholder="14 chiffres">
          </div>
        </div>

        <div class="field">
          <label for="account-societe">Société / structure *</label>
          <input id="account-societe" type="text" required>
        </div>

        <div class="inline-fields">
          <div class="field">
            <label for="account-prenom">Prénom *</label>
            <input id="account-prenom" type="text" required>
          </div>
          <div class="field">
            <label for="account-nom">Nom *</label>
            <input id="account-nom" type="text" required>
          </div>
        </div>

        <div class="inline-fields">
          <div class="field">
            <label for="account-email">Email principal *</label>
            <input id="account-email" type="email" required>
          </div>
          <div class="field">
            <label for="account-telephone">Téléphone</label>
            <input id="account-telephone" type="tel">
          </div>
        </div>

        <div class="field">
          <label for="account-adresse">Adresse</label>
          <input id="account-adresse" type="text">
        </div>

        <div class="inline-fields">
          <div class="field">
            <label for="account-cp">Code postal</label>
            <input id="account-cp" type="text">
          </div>
          <div class="field">
            <label for="account-ville">Ville</label>
            <input id="account-ville" type="text">
          </div>
        </div>

        <div class="account-opening-box">
          <strong id="account-payment-preview">Paiement demandé : virement sous 48h.</strong>
          <div class="inline-fields">
            <div class="field">
              <label for="account-contact">Contact facturation</label>
              <input id="account-contact" type="text">
            </div>
            <div class="field">
              <label for="account-email-facturation">Email facturation</label>
              <input id="account-email-facturation" type="email">
            </div>
          </div>
          <div class="field">
            <label for="account-info">Informations complémentaires</label>
            <textarea id="account-info" placeholder="Service, bon de commande, Chorus Pro, horaires, conditions internes..."></textarea>
          </div>
        </div>

        <button class="btn" id="account-opening-submit" type="submit">Envoyer la demande</button>
        <div class="status" id="account-opening-status"></div>
      </form>
    </section>
  </main>

  <script src="./site-pages.js" defer></script>
</body>
</html>
