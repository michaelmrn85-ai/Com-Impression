<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">
  <title>Laisser un avis | COM' Impression</title>
  <meta name="description" content="Partagez votre avis après une commande COM' Impression : impression, livraison et accompagnement client.">
  <link rel="canonical" href="https://com-impression.fr/avis">
  <meta property="og:title" content="Laisser un avis | COM' Impression">
  <meta property="og:description" content="Votre retour aide COM' Impression à améliorer ses services et accompagne les prochains clients.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://com-impression.fr/avis">
  <meta property="og:image" content="https://com-impression.fr/com-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./site-theme.css">
</head>
<body data-page="avis">
  <header class="topbar">
    <div class="nav">
      <a class="brand" href="./com-impression.html">
        <img class="brand-mark" src="./com-logo.png" alt="Logo COM' Impression">
        <div class="brand-copy">
          <strong>COM' Impression</strong>
          <span>Avis client</span>
        </div>
      </a>
      <form class="search-shell" data-search-form>
        <input type="search" placeholder="Rechercher un produit ou une gamme...">
        <button class="btn" type="submit">Rechercher</button>
      </form>
      <div class="nav-actions">
        <button class="action-btn" data-account-button type="button"><span data-account-label>Mon compte</span></button>
        <button class="action-btn cart" data-cart-button type="button">Panier <span class="cart-count" data-cart-count>0</span></button>
      </div>
    </div>
  </header>

  <main class="page-shell">
    <section class="section">
      <div class="section-head">
        <div>
          <p class="eyebrow">Votre retour compte</p>
          <h1>Laisser un avis</h1>
          <p>Merci de partager votre expérience après réception de votre commande.</p>
        </div>
      </div>

      <form class="form-card" id="review-form">
        <div class="inline-fields">
          <div class="field">
            <label for="review-prenom">Prénom *</label>
            <input id="review-prenom" type="text" required>
          </div>
          <div class="field">
            <label for="review-ville">Ville</label>
            <input id="review-ville" type="text">
          </div>
        </div>
        <div class="inline-fields">
          <div class="field">
            <label for="review-produit">Produit</label>
            <input id="review-produit" type="text">
          </div>
          <div class="field">
            <label for="review-commande">Commande</label>
            <input id="review-commande" type="text">
          </div>
        </div>
        <div class="field">
          <label for="review-note">Note</label>
          <select id="review-note">
            <option value="5">5 / 5</option>
            <option value="4">4 / 5</option>
            <option value="3">3 / 5</option>
            <option value="2">2 / 5</option>
            <option value="1">1 / 5</option>
          </select>
        </div>
        <div class="field">
          <label for="review-text">Votre avis *</label>
          <textarea id="review-text" required placeholder="Qualité, accompagnement, livraison, résultat final..."></textarea>
        </div>
        <button class="btn" id="review-submit" type="submit">Envoyer mon avis</button>
        <div class="status" id="review-status"></div>
      </form>
    </section>
  </main>

  <script src="./site-pages.js" defer></script>
</body>
</html>
