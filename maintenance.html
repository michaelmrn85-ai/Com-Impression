<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mise à jour en cours | COM' Impression</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <style>
    :root{--orange:#ff7a1a;--ink:#171310;--muted:#6b625b;--line:#efd8c0}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#090705;font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
    body::before{content:"";position:fixed;inset:auto -10% -30% -10%;height:55vh;background:radial-gradient(circle at 50% 0%,rgba(255,122,26,.28),transparent 58%);pointer-events:none}
    main{position:relative;width:min(620px,100%);text-align:center;background:#fffaf4;border:2px solid var(--orange);border-radius:30px;padding:46px 34px;box-shadow:0 26px 90px rgba(255,122,26,.22)}
    img{width:min(250px,72%);height:auto;margin-bottom:26px}
    h1{margin:0 0 12px;font-size:clamp(2rem,6vw,3rem);line-height:1;color:var(--orange)}
    p{margin:0 auto;color:var(--muted);font-size:1.08rem;line-height:1.65;max-width:36ch}
    .note{margin-top:22px;color:#171310;font-weight:700}
  </style>
</head>
<body>
  <main>
    <img src="./com-logo.png" alt="COM' Impression">
    <h1>Mise à jour en cours</h1>
    <p data-maintenance-message>Le site est en reconstruction afin de repartir sur un catalogue plus clair et plus propre.</p>
    <p class="note">Merci de votre compréhension.</p>
  </main>
</body>
</html>
