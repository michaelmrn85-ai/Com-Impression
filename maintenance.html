<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mise à jour en cours | COM' Impression</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <style>
    :root{--orange:#ff7a1a;--ink:#171310;--muted:#6b625b;--line:#efd8c0}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(180deg,#fff8f0 0%,#fff 52%,#fff0df 100%);font-family:Arial,Helvetica,sans-serif;color:var(--ink)}
    main{width:min(560px,100%);text-align:center;background:#fff;border:1px solid var(--line);border-radius:28px;padding:42px 30px;box-shadow:0 24px 80px rgba(23,19,16,.12)}
    img{width:min(230px,70%);height:auto;margin-bottom:22px}
    h1{margin:0 0 12px;font-size:clamp(2rem,6vw,3rem);line-height:1;color:var(--orange)}
    p{margin:0 auto;color:var(--muted);font-size:1.08rem;line-height:1.65;max-width:36ch}
  </style>
</head>
<body>
  <main>
    <img src="./com-logo.png" alt="COM' Impression">
    <h1>Mise à jour en cours</h1>
    <p>Votre site revient dans quelques instants. Merci de votre compréhension.</p>
  </main>
</body>
</html>
